name: Build and publish go-wwan package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-wwan
          ARCH=all
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" \
                   "${BUILD}/usr/bin" \
                   "${BUILD}/lib/systemd/system" \
                   "${DIST}"

          # --- Files --------------------------------------------------------------
          install -Dm755 debian/go-wwan-start "${BUILD}/usr/bin/go-wwan-start"
          install -Dm755 debian/go-wwan-stop  "${BUILD}/usr/bin/go-wwan-stop"
          install -Dm644 debian/go-wwan.service \
            "${BUILD}/lib/systemd/system/go-wwan.service"

          # --- DEBIAN/control -----------------------------------------------------
          cat > "${BUILD}/DEBIAN/control" << CONTROL
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Section: misc
          Priority: optional
          Homepage: https://gocontroll.com
          Description: A service to enable WWAN on the GOcontroll Moduline controllers
           Provides scripts and a systemd service to power on and configure
           WWAN modems on GOcontroll Moduline controllers.
          CONTROL

          # --- DEBIAN/postinst ----------------------------------------------------
          # Service is NOT auto-enabled/started (must be enabled manually)
          cat > "${BUILD}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          set -e
          case "$1" in
              configure)
                  systemctl daemon-reload
                  ;;
          esac
          POSTINST
          chmod 755 "${BUILD}/DEBIAN/postinst"

          # --- DEBIAN/prerm -------------------------------------------------------
          cat > "${BUILD}/DEBIAN/prerm" << 'PRERM'
          #!/bin/bash
          set -e
          case "$1" in
              remove|purge)
                  systemctl stop go-wwan.service || true
                  systemctl disable go-wwan.service || true
                  ;;
          esac
          PRERM
          chmod 755 "${BUILD}/DEBIAN/prerm"

          # --- DEBIAN/postrm ------------------------------------------------------
          cat > "${BUILD}/DEBIAN/postrm" << 'POSTRM'
          #!/bin/bash
          set -e
          case "$1" in
              purge)
                  systemctl daemon-reload || true
                  ;;
          esac
          POSTRM
          chmod 755 "${BUILD}/DEBIAN/postrm"

          # --- Build --------------------------------------------------------------
          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/go-wwan_${{ steps.version.outputs.version }}_all.deb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-wwan",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "all",
              "deb_url": "https://github.com/GOcontroll/go-wwan/releases/download/${{ github.ref_name }}/go-wwan_${{ steps.version.outputs.version }}_all.deb"
            }
